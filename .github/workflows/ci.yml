name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # prisma.config.ts calls env("DATABASE_URL") during `prisma generate`.
      # No actual DB connection is made — a placeholder URL is enough for CI.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/evcore
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test (backend)
        run: pnpm --filter backend test

  ml-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/ml-worker
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          # Matches apps/ml-worker/Dockerfile (python:3.12-slim).
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            apps/ml-worker/requirements.txt
            apps/ml-worker/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Test (ml-worker)
        run: python -m pytest
