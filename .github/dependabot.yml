version: 2
updates:
  # --- GitHub Actions ---
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"

  # --- npm / pnpm workspace (lockfile unique à la racine) ---
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
    groups:
      nestjs:
        patterns:
          - "@nestjs/*"
          - "rxjs"
          - "reflect-metadata"
      nextjs:
        patterns:
          - "next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      prisma:
        patterns:
          - "prisma"
          - "@prisma/*"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "supertest"
          - "@types/supertest"
      tooling:
        patterns:
          - "typescript"
          - "eslint"
          - "@typescript-eslint/*"
          - "prettier"
          - "turbo"
      bullmq:
        patterns:
          - "bullmq"
          - "ioredis"

  # --- Docker (backend) ---
  - package-ecosystem: "docker"
    directory: "/apps/backend"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "docker"
