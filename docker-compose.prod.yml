name: evcore-prod

# ── Usage ────────────────────────────────────────────────────────────────────
# Image built and pushed to GHCR by GitHub Actions (workflows/deploy.yml).
# The VPS only pulls and runs — no build step on the server.
#
# 1. Copy apps/backend/.env.example → .env and fill values
# 2. Start all services (migrations run automatically on backend startup):
#      docker compose -f docker-compose.prod.yml up -d
# 3. After a new push to main: GitHub Actions handles pull + restart automatically
# ─────────────────────────────────────────────────────────────────────────────
#
# GHCR_OWNER: GitHub username or org (e.g. "myuser")
# Set it in the .env file on the server: GHCR_OWNER=myuser

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:18-alpine
    container_name: evcore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evcore}
      POSTGRES_USER: ${POSTGRES_USER:-evcore}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/pgdata
    # Not exposed to host — backend accesses via internal Docker network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-evcore} -d ${POSTGRES_DB:-evcore}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: evcore-redis
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    # Not exposed to host — backend accesses via internal Docker network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── Backend ─────────────────────────────────────────────────────────────────
  # entrypoint.sh runs prisma migrate deploy then starts the NestJS app
  backend:
    container_name: evcore-backend
    image: ghcr.io/${GHCR_OWNER}/evcore-backend:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Override DB/Redis to use Docker service names (internal network)
      DATABASE_URL: postgresql://${POSTGRES_USER:-evcore}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-evcore}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Web (Next.js dashboard) ─────────────────────────────────────────────────
  web:
    container_name: evcore-web
    image: ghcr.io/${GHCR_OWNER}/evcore-web:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      # Backend API URL reachable from the browser (public-facing)
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
