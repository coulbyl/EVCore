name: evcore

services:
  postgres:
    image: postgres:18-alpine
    container_name: evcore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evcore}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-evcore}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: evcore-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:8.0.17
    container_name: evcore-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-secret}
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--username",
          "${MONGO_INITDB_ROOT_USERNAME:-root}",
          "--password",
          "${MONGO_INITDB_ROOT_PASSWORD:-secret}",
          "--eval",
          "db.adminCommand('ping').ok",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  novu-api:
    image: ghcr.io/novuhq/novu/api:3.11.0
    container_name: evcore-novu-api
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NOVU_NODE_ENV:-local}
      PORT: ${NOVU_API_PORT:-3010}
      API_ROOT_URL: ${NOVU_API_ROOT_URL:-http://localhost:3010}
      FRONT_BASE_URL: ${NOVU_FRONT_BASE_URL:-http://localhost:4000}
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-root}:${MONGO_INITDB_ROOT_PASSWORD:-secret}@mongodb:27017/novu-db?authSource=admin
      MONGO_MIN_POOL_SIZE: ${NOVU_MONGO_MIN_POOL_SIZE:-5}
      MONGO_MAX_POOL_SIZE: ${NOVU_MONGO_MAX_POOL_SIZE:-10}
      MONGO_AUTO_CREATE_INDEXES: ${NOVU_MONGO_AUTO_CREATE_INDEXES:-true}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${NOVU_REDIS_PASSWORD:-}
      REDIS_DB_INDEX: 2
      REDIS_CACHE_SERVICE_HOST: redis
      REDIS_CACHE_SERVICE_PORT: 6379
      JWT_SECRET: ${NOVU_JWT_SECRET:-change-me-in-production}
      STORE_ENCRYPTION_KEY: ${NOVU_STORE_ENCRYPTION_KEY:-change-me-32-char-store-key-000}
      NOVU_SECRET_KEY: ${NOVU_SECRET_KEY:-change-me-novu-secret}
      SUBSCRIBER_WIDGET_JWT_EXPIRATION_TIME: ${NOVU_SUBSCRIBER_WIDGET_JWT_EXPIRATION_TIME:-15d}
      IS_API_IDEMPOTENCY_ENABLED: false
      IS_API_RATE_LIMITING_ENABLED: false
      IS_NEW_MESSAGES_API_RESPONSE_ENABLED: true
      IS_V2_ENABLED: true
      S3_LOCAL_STACK: ${NOVU_S3_LOCAL_STACK:-localhost:4566}
      S3_BUCKET_NAME: ${NOVU_S3_BUCKET_NAME:-novu-local}
      S3_REGION: ${NOVU_S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${NOVU_AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${NOVU_AWS_SECRET_ACCESS_KEY:-test}
      NEW_RELIC_ENABLED: false
    ports:
      - "${NOVU_API_PORT:-3010}:${NOVU_API_PORT:-3010}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:$${PORT}/v1/health-check || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s

  novu-worker:
    image: ghcr.io/novuhq/novu/worker:3.11.0
    container_name: evcore-novu-worker
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      novu-api:
        condition: service_healthy
    environment:
      NODE_ENV: ${NOVU_NODE_ENV:-local}
      PORT: ${NOVU_WORKER_PORT:-3004}
      API_ROOT_URL: http://novu-api:${NOVU_API_PORT:-3010}
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-root}:${MONGO_INITDB_ROOT_PASSWORD:-secret}@mongodb:27017/novu-db?authSource=admin
      MONGO_MAX_POOL_SIZE: ${NOVU_MONGO_MAX_POOL_SIZE:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${NOVU_REDIS_PASSWORD:-}
      REDIS_DB_INDEX: 2
      REDIS_CACHE_SERVICE_HOST: redis
      REDIS_CACHE_SERVICE_PORT: 6379
      STORE_ENCRYPTION_KEY: ${NOVU_STORE_ENCRYPTION_KEY:-change-me-32-char-store-key-000}
      SUBSCRIBER_WIDGET_JWT_EXPIRATION_TIME: ${NOVU_SUBSCRIBER_WIDGET_JWT_EXPIRATION_TIME:-15d}
      BROADCAST_QUEUE_CHUNK_SIZE: 100
      MULTICAST_QUEUE_CHUNK_SIZE: 100
      S3_LOCAL_STACK: ${NOVU_S3_LOCAL_STACK:-localhost:4566}
      S3_BUCKET_NAME: ${NOVU_S3_BUCKET_NAME:-novu-local}
      S3_REGION: ${NOVU_S3_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID: ${NOVU_AWS_ACCESS_KEY_ID:-test}
      AWS_SECRET_ACCESS_KEY: ${NOVU_AWS_SECRET_ACCESS_KEY:-test}
      NEW_RELIC_ENABLED: false

  novu-ws:
    image: ghcr.io/novuhq/novu/ws:3.11.0
    container_name: evcore-novu-ws
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NOVU_NODE_ENV:-local}
      PORT: ${NOVU_WS_PORT:-3012}
      MONGO_URL: mongodb://${MONGO_INITDB_ROOT_USERNAME:-root}:${MONGO_INITDB_ROOT_PASSWORD:-secret}@mongodb:27017/novu-db?authSource=admin
      MONGO_MAX_POOL_SIZE: ${NOVU_MONGO_MAX_POOL_SIZE:-10}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${NOVU_REDIS_PASSWORD:-}
      JWT_SECRET: ${NOVU_JWT_SECRET:-change-me-in-production}
      NEW_RELIC_ENABLED: false
    ports:
      - "${NOVU_WS_PORT:-3012}:${NOVU_WS_PORT:-3012}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:$${PORT}/v1/health-check || exit 1",
        ]
      interval: 20s
      timeout: 10s
      retries: 3
      start_period: 40s

  novu-dashboard:
    image: ghcr.io/novuhq/novu/dashboard:3.11.0
    container_name: evcore-novu-dashboard
    restart: unless-stopped
    depends_on:
      novu-api:
        condition: service_healthy
      novu-worker:
        condition: service_started
    environment:
      VITE_API_HOSTNAME: ${NOVU_DASHBOARD_API_HOSTNAME:-http://localhost:3010}
      VITE_WEBSOCKET_HOSTNAME: ${NOVU_DASHBOARD_WS_HOSTNAME:-http://localhost:3012}
      VITE_LEGACY_DASHBOARD_URL: ${NOVU_LEGACY_DASHBOARD_URL:-http://localhost:4000}
      VITE_SELF_HOSTED: "true"
    ports:
      - "${NOVU_DASHBOARD_PORT:-4000}:4000"

volumes:
  postgres_data:
  redis_data:
  mongodb_data:
