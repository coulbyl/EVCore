name: evcore

services:
  postgres:
    image: postgres:18-alpine
    container_name: evcore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evcore}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      PGDATA: /var/lib/postgresql/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-evcore}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: evcore-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # redisinsight:
  #   image: redis/redisinsight:latest
  #   container_name: evcore-redisinsight
  #   restart: unless-stopped
  #   ports:
  #     - "${REDISINSIGHT_PORT:-5540}:5540"
  #   depends_on:
  #     redis:
  #       condition: service_healthy

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: evcore-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-evcore}"
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 20
      MAX_PREPARED_STATEMENTS: "100"
      LOG_CONNECTIONS: "0"
      LOG_DISCONNECTIONS: "0"
    ports:
      - "${PGBOUNCER_PORT:-5433}:5432"
    depends_on:
      postgres:
        condition: service_healthy

  ml-worker:
    build:
      context: ./apps/ml-worker
      dockerfile: Dockerfile
    container_name: evcore-ml-worker
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-evcore}"
      PGBOUNCER_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@pgbouncer:5432/${POSTGRES_DB:-evcore}"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      LOG_LEVEL: info
    volumes:
      - ml_models:/app/models
    depends_on:
      pgbouncer:
        condition: service_started
      redis:
        condition: service_healthy

  mailpit:
    image: axllent/mailpit:latest
    container_name: evcore-mailpit
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

volumes:
  postgres_data:
  redis_data:
  ml_models:
